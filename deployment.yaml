apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-bot
  template:
    metadata:
      labels:
        app: nodejs-bot
    spec:
      containers:
      - name: bot-container
        image: node:20-alpine 
        command: ["sh", "-c", "while true; do sleep 3600; done"]
