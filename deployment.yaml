apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-bot
spec:
  replicas: 0
  selector:
    matchLabels:
      app: nodejs-bot
  template:
    metadata:
      labels:
        app: nodejs-bot
    spec:
      containers:
      - name: bot-container
        image: ghcr.io/egorpirkov/training-tg-bot:latest
        imagePullPolicy: Never
        volumeMounts:
        - name: db-volume
          mountPath: /app/data

      volumes:
      - name: db-volume
        hostPath:
          path: /root/kachbot/Training-tg-bot
          type: Directory
